<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>الاختبار التجريبي للبرمجة 🚀</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* ================= المتغيرات ================= */
        :root {
            --bg-body-1: #020617; 
            --bg-body-2: #0f172a;
            --card-bg: rgba(15, 23, 42, 0.9); 
            --glass-border: rgba(255, 255, 255, 0.2); 
            --primary: #3b82f6;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --hue: 220;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            max-width: 100%;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        body {
            background: linear-gradient(135deg, var(--bg-body-1), var(--bg-body-2));
            color: var(--text-main);
            font-family: 'Tajawal', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* خلفية متحركة */
        .bg-blobs { 
            position: fixed; 
            width: 100%; 
            height: 100%; 
            z-index: 0; 
            overflow: hidden; 
            pointer-events: none; 
            filter: blur(90px); 
            opacity: 0.35; 
            top: 0;
            left: 0;
        }
        .blob { 
            position: absolute; 
            border-radius: 50%; 
            animation: float 12s infinite alternate ease-in-out; 
        }
        .blob-1 { 
            width: 50vw; 
            height: 50vw; 
            min-width: 300px; 
            min-height: 300px; 
            background: hsla(var(--hue), 80%, 60%, 0.5); 
            top: -10%; 
            left: -10%; 
            transition: background 1s ease; 
        }
        .blob-2 { 
            width: 60vw; 
            height: 60vw; 
            min-width: 400px; 
            min-height: 400px; 
            background: hsla(calc(var(--hue) + 60), 80%, 60%, 0.5); 
            bottom: -20%; 
            right: -10%; 
            animation-delay: -6s; 
            transition: background 1s ease; 
        }
        @keyframes float { 
            0% { transform: translate(0, 0) scale(1); } 
            100% { transform: translate(40px, 60px) scale(1.15); } 
        }

        /* ================= الحاوية الرئيسية ================= */
        #app-container {
            position: relative;
            width: 100%;
            height: 95%;
            max-width: 98%;
            padding: 5px 12px 12px 12px;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: hidden;
        }

        /* الكارت */
        .card {
            position: absolute;
            width: 100%;
            height: 100%;
            max-height: 100%;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 2px solid var(--glass-border);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: clamp(20px, 5vw, 35px);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.9), 0 0 40px hsla(var(--hue), 100%, 60%, 0.2), inset 0 2px 0 rgba(255,255,255,0.2);
            opacity: 0;
            transform: translateY(50px) scale(0.95);
            pointer-events: none;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            gap: 15px;
        }
        
        .card::-webkit-scrollbar { width: 5px; }
        .card::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; margin-top: 8px; margin-bottom: 8px; }
        .card::-webkit-scrollbar-thumb { background: hsla(var(--hue), 80%, 60%, 0.6); border-radius: 10px; }
        
        .card > * { width: 100%; max-width: 100%; }
        
        .card.active {
            opacity: 1;
            transform: translateY(0) scale(1);
            pointer-events: auto;
            position: relative;
            border-top: 4px solid hsla(var(--hue), 90%, 65%, 1);
            box-shadow: 0 0 80px hsla(var(--hue), 90%, 60%, 0.4);
        }

        /* شريط التقدم */
        .progress-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            width: 100%;
            z-index: 20;
            padding: 8px 12px 0 12px;
            background: transparent;
            display: none;
        }
        .progress-container {
            width: 100%;
            height: 6px;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), hsla(var(--hue), 90%, 65%, 1));
            transition: width 0.5s ease-out;
            border-radius: 10px;
        }

        /* العناصر */
        .brand-name {
            font-size: clamp(1.4rem, 4vw, 2.2rem);
            font-weight: 900;
            background: linear-gradient(to right, #f37a09, #fcf6ba, #b38728, #49d668, #807ad4);
            background-size: 200% auto;
            -webkit-background-clip: text;
            color: transparent;
            text-shadow: 0px 4px 15px rgba(243, 146, 19, 0.4);
            letter-spacing: 1px;
            display: inline-block;
            margin: 5px auto;
            animation: shine-brand 4s linear infinite;
            text-align: center;
        }
        @keyframes shine-brand {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .rect-img-container {
            position: relative;
            width: min(180px, 45vw);
            height: min(250px, 60vw);
            max-width: 200px;
            max-height: 280px;
            margin: 0 auto 15px auto;
            border-radius: 24px;
            background: var(--bg-body-1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            flex-shrink: 0;
        }
        .rect-img-container::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 700px;
            background: conic-gradient(transparent, transparent, transparent, #fbbf24, var(--primary), #fbbf24);
            animation: spin-border 4s linear infinite;
        }
        @keyframes spin-border { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .rect-img-container img { 
            position: relative; 
            width: calc(100% - 8px); 
            height: calc(100% - 8px); 
            border-radius: 20px; 
            object-fit: cover; 
            z-index: 1; 
        }

        h1, h2, h3 { text-align: center; font-weight: 900; line-height: 1.4; }
        .title { font-size: clamp(1.6rem, 5vw, 2.5rem); margin-bottom: 5px; background: linear-gradient(to left, #fff, #93c5fd); -webkit-background-clip: text; color: transparent; text-align: center; }
        
        .input-group { 
            display: flex; 
            flex-direction: column; 
            gap: 8px; 
            width: 100%; 
            max-width: 500px; 
            margin: 0 auto; 
        }
        .input-group label { 
            font-size: 1.1rem; 
            color: var(--text-muted); 
            font-weight: 800; 
            text-align: center; 
        }
        .input-group input { 
            background: rgba(0, 0, 0, 0.5); 
            border: 2px solid rgba(255,255,255,0.2); 
            color: white; 
            padding: 18px; 
            border-radius: 16px; 
            font-size: 1.1rem; 
            outline: none; 
            transition: 0.3s; 
            font-family: inherit; 
            font-weight: 700;
            text-align: center;
            width: 100%;
        }
        .input-group input:focus { 
            border-color: hsla(var(--hue), 80%, 60%, 1); 
            box-shadow: 0 0 25px hsla(var(--hue), 80%, 60%, 0.5); 
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, hsla(var(--hue), 80%, 50%, 1));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 8px 30px hsla(var(--hue), 80%, 50%, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            touch-action: manipulation;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }
        .btn-primary:active { transform: scale(0.97); }
        .btn-primary:disabled { background: #334155; color: #94a3b8; cursor: not-allowed; box-shadow: none; opacity: 0.7; }
        .btn-whatsapp { background: linear-gradient(135deg, #10b981, #059669); }
        .btn-review { background: linear-gradient(135deg, #f59e0b, #d97706); }
        .btn-restart { background: linear-gradient(135deg, #8b5cf6, #6d28d9); }

        /* كارت الإهداء */
        .dedication-content { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            width: 100%;
            height: 100%; 
            text-align: center; 
            gap: 15px;
        }
        .dedication-title { 
            font-size: clamp(2rem, 6vw, 3.5rem); 
            font-weight: 900; 
            background: linear-gradient(45deg, #fbbf24, #f59e0b, #ef4444, #ec4899, #8b5cf6); 
            background-size: 300%; 
            -webkit-background-clip: text; 
            color: transparent; 
            animation: gradient-flow 5s ease infinite; 
            text-align: center;
        }
        @keyframes gradient-flow { 
            0% { background-position: 0% 50%; } 
            50% { background-position: 100% 50%; } 
            100% { background-position: 0% 50%; } 
        }
        
        .dedication-section { 
            width: 100%; 
            background: rgba(0,0,0,0.4); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 10px; 
            opacity: 0; 
            animation: fadeUp 1s forwards;
        }
        .ded-delay-1 { animation-delay: 0.5s; }
        .ded-delay-2 { animation-delay: 1.5s; }
        
        .ded-label { 
            color: #bae6fd; 
            font-size: 1rem; 
            font-weight: 700; 
            margin-bottom: 8px; 
            text-align: center;
        }
        .name-highlight { 
            color: #fbbf24; 
            text-shadow: 0 0 15px rgba(251, 191, 36, 0.6); 
            font-size: clamp(1.2rem, 4vw, 1.8rem); 
            font-weight: 900; 
            display: block; 
            margin: 5px 0;
            text-align: center;
        }
        
        .dedication-timer-box { 
            margin-top: 15px; 
            padding: 12px 25px; 
            background: rgba(59,130,246,0.2); 
            border-radius: 30px; 
            font-size: 1.1rem; 
            font-weight: bold; 
            border: 1px solid var(--primary);
            text-align: center;
        }
        @keyframes fadeUp { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* الأسئلة */
        .question-meta { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            font-size: 0.9rem; 
            color: #cbd5e1; 
            font-weight: 800; 
            border-bottom: 1px solid rgba(255,255,255,0.1); 
            padding-bottom: 10px; 
            flex-wrap: wrap; 
            gap: 8px;
            width: 100%;
        }
        .timer-badge { 
            background: rgba(0,0,0,0.5); 
            padding: 5px 12px; 
            border-radius: 20px; 
            border: 1px solid rgba(255,255,255,0.2); 
            display: flex; 
            gap: 6px; 
            align-items: center; 
            font-weight: 900; 
        }
        .timer-danger { 
            color: #fca5a5; 
            border-color: var(--danger); 
            animation: pulse-danger 1s infinite; 
        }
        @keyframes pulse-danger { 
            0% { box-shadow: 0 0 0 rgba(239, 68, 68, 0); } 
            50% { box-shadow: 0 0 12px rgba(239, 68, 68, 0.5); } 
            100% { box-shadow: 0 0 0 rgba(239, 68, 68, 0); } 
        }
        
        .question-text { 
            font-size: clamp(1.1rem, 4vw, 1.5rem); 
            font-weight: 800; 
            line-height: 1.6; 
            text-align: center; 
            margin-top: 5px; 
            width: 100%;
        }
        
        .code-block { 
            background: #020617; 
            border-left: 5px solid hsla(var(--hue), 80%, 60%, 1); 
            padding: 12px; 
            border-radius: 12px; 
            font-family: monospace; 
            font-size: 0.9rem; 
            direction: ltr; 
            text-align: left; 
            white-space: pre-wrap; 
            word-break: break-word;
            color: #38bdf8; 
            margin-bottom: 10px; 
            width: 100%;
        }
        
        .options-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            margin-top: 5px; 
            width: 100%;
        }
        .option-btn { 
            background: rgba(255, 255, 255, 0.03); 
            border: 2px solid rgba(255, 255, 255, 0.1); 
            padding: 12px; 
            border-radius: 14px; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            cursor: pointer; 
            transition: 0.2s; 
            text-align: right; 
            font-size: 1rem; 
            font-weight: 700; 
            color: #f1f5f9; 
            min-height: 55px;
            width: 100%;
        }
        .option-letter { 
            width: 34px; 
            height: 34px; 
            border-radius: 50%; 
            background: rgba(255,255,255,0.15); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-weight: bold; 
            font-size: 1rem; 
            flex-shrink: 0; 
        }
        .option-btn.correct { background: rgba(16, 185, 129, 0.2); border-color: var(--success); }
        .option-btn.correct .option-letter { background: var(--success); }
        .option-btn.wrong { background: rgba(239, 68, 68, 0.2); border-color: var(--danger); }
        .option-btn.wrong .option-letter { background: var(--danger); }
        .option-btn.disabled { pointer-events: none; opacity: 0.7; }

        /* النتائج */
        .links-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
            gap: 10px; 
            margin-top: 15px; 
            direction: ltr; 
            width: 100%;
        }
        .link-item { 
            background: rgba(0,0,0,0.4); 
            padding: 10px; 
            border-radius: 12px; 
            text-align: center; 
            text-decoration: none; 
            color: #60a5fa; 
            font-size: 0.85rem; 
            font-weight: 700; 
            border: 1px solid rgba(255,255,255,0.1); 
            transition: 0.3s;
        }
        .link-item:active { background: hsla(var(--hue), 80%, 60%, 1); color: white; transform: scale(0.98); }
        
        .score-circle { 
            width: min(160px, 40vw); 
            height: min(160px, 40vw); 
            border-radius: 50%; 
            background: conic-gradient(var(--primary) calc(var(--percentage) * 1%), rgba(255,255,255,0.1) 0); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin: 15px auto; 
            position: relative; 
        }
        .score-circle::before { 
            content: ""; 
            position: absolute; 
            width: 75%; 
            height: 75%; 
            background: var(--card-bg); 
            border-radius: 50%; 
        }
        .score-value { 
            position: relative; 
            z-index: 1; 
            font-size: clamp(2rem, 6vw, 2.8rem); 
            font-weight: 900; 
        }

        /* الأخطاء */
        .mistake-item { 
            background: rgba(0,0,0,0.3); 
            padding: 15px; 
            border-radius: 16px; 
            border-right: 4px solid var(--danger); 
            width: 100%;
            text-align: center;
        }
        .mistake-ans { padding: 6px 0; font-size: 0.9rem; text-align: center; }
        .m-wrong { color: #fca5a5; }
        .m-correct { color: #86efac; }
        .m-hint { 
            margin-top: 8px; 
            padding: 8px; 
            background: rgba(251,191,36,0.1); 
            border-radius: 12px; 
            font-size: 0.85rem;
            text-align: center;
        }

        @media (max-width: 480px) {
            .card { padding: 14px; gap: 10px; }
            .option-btn { padding: 10px; min-height: 50px; }
            .btn-primary { padding: 14px; font-size: 1rem; }
        }
    </style>
</head>
<body>

    <div class="bg-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>

    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-container"><div class="progress-bar" id="progressBar"></div></div>
    </div>

    <div id="app-container"></div>

    <script>
        // ================= الأسئلة الـ 50 الكاملة =================
        const quizData = [
            { skill: "تحليل الكود (Type Coercion)", text: "ما هو الناتج الدقيق لعملية الجمع والضرب المختلطة في لغة JavaScript، بناءً على أولويات التنفيذ والتحويل الضمني (Type Coercion)؟", code: "console.log(\"10\" + 5 * 2);", options:[{t:"\"1010\"",id:"A"},{t:"20",id:"B"},{t:"\"20\"",id:"C"},{t:"NaN",id:"D"}], ans: "A", hint: "عملية الضرب تُنفذ أولاً (5*2=10)، ثم يتم دمج الناتج كنص مع السلسلة \"10\"." },
            { skill: "Debugging (Logical Trap)", text: "في الكود التالي، يتم استخدام معامل التخصيص داخل جملة الشرط. ماذا ستكون النتيجة المطبوعة على الشاشة؟", code: "let power = 50;\nif (power = 100) {\n  console.log(\"Max Power\");\n} else {\n  console.log(\"Low Power\");\n}", options:[{t:"يطبع \"Low Power\" لأن 50 لا تساوي 100",id:"A"},{t:"ينتج خطأ (SyntaxError) لمنع استخدام = داخل if",id:"B"},{t:"يطبع \"Max Power\" لأن عملية الإسناد تعيد 100 وهي قيمة صحيحة (Truthy)",id:"C"},{t:"لا يطبع شيئاً",id:"D"}], ans: "C", hint: "المعامل = هو للإسناد وليس للمقارنة، والقيمة 100 تُعتبر True." },
            { skill: "تحليل النطاق (Scope Logic)", text: "ما هو ناتج تنفيذ الكود التالي الخاص بنطاق المتغيرات (Scope)؟", code: "let x = 10;\nif (x === 10) {\n  let x = 20;\n}\nconsole.log(x);", options:[{t:"20",id:"A"},{t:"10",id:"B"},{t:"undefined",id:"C"},{t:"ReferenceError",id:"D"}], ans: "B", hint: "المتغير المُعرف بـ let داخل الأقواس له نطاق كتلة (Block Scope) ولا يؤثر على المتغير الخارجي." },
            { skill: "الاستنتاج (Short-circuiting)", text: "كيف سيتعامل مترجم JavaScript مع التقييم قصير المدى (Short-circuit) في التعبير المنطقي التالي؟", code: "console.log(false && (10 / 0 === 0));", options:[{t:"يطبع true",id:"A"},{t:"ينتج خطأ قسمة على صفر",id:"B"},{t:"يطبع NaN",id:"C"},{t:"يطبع false مباشرة دون قراءة الطرف الثاني",id:"D"}], ans: "D", hint: "معامل && يتوقف عن التقييم فوراً إذا كان الطرف الأول false." },
            { skill: "AI Thinking (مفاهيم متقدمة)", text: "أي من الجمل التالية يعتبر الوصف الأدق للفرق بين الذكاء الاصطناعي التوليدي (Generative AI) وقواعد البيانات التقليدية؟", code: "", options:[{t:"كلاهما يخزن الحقائق لاسترجاعها لاحقاً",id:"A"},{t:"الذكاء التوليدي يتنبأ بالكلمة الأكثر احتمالية بناءً على الأنماط، بينما قاعدة البيانات تسترجع حقائق مسجلة",id:"B"},{t:"الذكاء التوليدي يعتمد على لغة HTML لعرض النتائج",id:"C"},{t:"قواعد البيانات تمتلك وعياً مستقلاً وتتخذ قرارات عاطفية",id:"D"}], ans: "B", hint: "النماذج التوليدية لا تدرك الحقائق بل تبني تسلسلات احتمالية." },
            { skill: "Problem Solving (Loop Traps)", text: "تم تصميم خوارزمية للعد التنازلي. ما هو الخطأ القاتل الذي سيؤدي إلى حلقة لا نهائية (Infinite Loop) في الكود التالي؟", code: "for(let i = 10; i > 0; i++) {\n  console.log(i);\n}", options:[{t:"الشرط i > 0 خاطئ",id:"A"},{t:"استخدام معامل الزيادة i++ بدلاً من معامل النقصان i--",id:"B"},{t:"عدم تعريف i كـ const",id:"C"},{t:"لا يوجد خطأ",id:"D"}], ans: "B", hint: "العداد يزداد (11, 12, 13...) ولن يصل أبداً إلى الصفر لكسر الشرط." },
            { skill: "تتبع المصفوفات (Array Behavior)", text: "في المصفوفات، ماذا سيطبع الكود التالي عند محاولة الوصول لفهرس غير موجود؟", code: "let data =[1, 2];\ndata[3] = 50;\nconsole.log(data.length);", options:[{t:"2",id:"A"},{t:"3",id:"B"},{t:"6",id:"C"},{t:"Error",id:"D"}], ans: "C", hint: "عند إسناد قيمة في فهرس متجاوز، تتوسع المصفوفة تلقائياً وتملأ الفجوات بـ empty/undefined." },
            { skill: "المنطق البرمجي (Control Flow)", text: "كيف سيُقيم المتصفح الشروط المتداخلة التالية إذا كانت درجة الطالب 95؟", code: "let score = 95;\nif(score > 50) { console.log(\"Pass\"); }\nelse if(score > 90) { console.log(\"Excellent\"); }", options:[{t:"يطبع \"Pass\" و \"Excellent\" معاً",id:"A"},{t:"يطبع \"Excellent\" فقط",id:"B"},{t:"يطبع \"Pass\" ويتجاهل باقي الشروط تماماً",id:"C"},{t:"ينتج خطأ بسبب التداخل",id:"D"}], ans: "C", hint: "في هيكل if...else if، يتم تنفيذ أول شرط يتحقق فقط." },
            { skill: "التفكير الحسابي (Mathematical Logic)", text: "تستخدم الدالة Math.random() لتوليد أرقام عشوائية. أي كود يولد بدقة رقماً صحيحاً بين 1 و 5 (شاملاً 1 و 5)؟", code: "", options:[{t:"Math.floor(Math.random() * 5);",id:"A"},{t:"Math.floor(Math.random() * 6) + 1;",id:"B"},{t:"Math.floor(Math.random() * 5) + 1;",id:"C"},{t:"Math.ceil(Math.random() * 4);",id:"D"}], ans: "C", hint: "الضرب في 5 يعطي (0 إلى 4.99)، و floor تزيل الكسر لتصبح (0 إلى 4)، والجمع 1 يجعلها (1 إلى 5)." },
            { skill: "Debugging (Function Arguments)", text: "ماذا سيحدث عند استدعاء دالة تأخذ وسيطين، وتمرير وسيط واحد فقط لها؟", code: "function calc(a, b) {\n  console.log(a + b);\n}\ncalc(5);", options:[{t:"يطبع 5",id:"A"},{t:"يطبع 0",id:"B"},{t:"يطبع NaN",id:"C"},{t:"ينتج خطأ SyntaxError",id:"D"}], ans: "C", hint: "الوسيط المفقود يصبح undefined، و 5 + undefined ينتج NaN." },
            { skill: "فهم الخوارزميات (Function Returns)", text: "ماذا يعيد الدالة في JavaScript إذا لم تحتوي على الكلمة المحجوزة `return` صراحة؟", code: "function greet() {\n  let x = \"Hello\";\n}\nconsole.log(greet());", options:[{t:"\"Hello\"",id:"A"},{t:"null",id:"B"},{t:"undefined",id:"C"},{t:"0",id:"D"}], ans: "C", hint: "غياب جملة return يجعل الدالة تعيد undefined كقيمة افتراضية." },
            { skill: "تحليل نوع البيانات (Data Types)", text: "عند محاولة تحويل سلسلة نصية لا تحتوي على أرقام إلى قيمة رياضية باستخدام معامل (+) الأحادي، ما هو الناتج؟", code: "let val = +\"Apple\";\nconsole.log(val);", options:[{t:"0",id:"A"},{t:"Error",id:"B"},{t:"undefined",id:"C"},{t:"NaN",id:"D"}], ans: "D", hint: "فشل التحويل الرياضي لنص غير رقمي ينتج دائماً Not-a-Number (NaN)." },
            { skill: "التصميم الرقمي (Digital Representation)", text: "في نظام الألوان الرقمية (RGB)، كم عدد المستويات اللونية المتاحة للون الأساسي الواحد في وضع الألوان الكاملة (Full Color) 24-bit؟", code: "", options:[{t:"16",id:"A"},{t:"256",id:"B"},{t:"1024",id:"C"},{t:"65536",id:"D"}], ans: "B", hint: "كل لون أساسي يشغل 8 بت، مما يوفر 2 أس 8 = 256 مستوى." },
            { skill: "فهم الشبكات (Networking Protocols)", text: "ما هي وظيفة طبقة بروتوكول TCP في نموذج الاتصالات؟", code: "", options:[{t:"اختيار المسار الأسرع للبيانات",id:"A"},{t:"تحويل اسم النطاق إلى عنوان IP",id:"B"},{t:"تقسيم البيانات إلى حزم، وترتيبها عند الاستلام، وطلب إعادة إرسال المفقود",id:"C"},{t:"إرسال البيانات في الوقت الفعلي دون التحقق من وصولها",id:"D"}], ans: "C", hint: "بروتوكول TCP يضمن موثوقية الاتصال بعكس UDP الذي يركز على السرعة." },
            { skill: "المفاهيم التكنولوجية (Network Types)", text: "ما الفرق الجوهري بين شبكة LAN وشبكة WAN؟", code: "", options:[{t:"LAN تعتمد على الأقمار الصناعية بينما WAN سلكية فقط",id:"A"},{t:"LAN تغطي منطقة جغرافية محدودة (كمبنى)، بينما WAN تربط بين مناطق جغرافية واسعة (كدول)",id:"B"},{t:"LAN أبطأ دائماً من WAN",id:"C"},{t:"LAN لا تستخدم أجهزة التوجيه (Routers) أبداً",id:"D"}], ans: "B", hint: "تصنيف الشبكات يعتمد بشكل أساسي على النطاق الجغرافي." },
            { skill: "الهندسة المنطقية (Logic Gates)", text: "أي من البوابات المنطقية (Logic Gates) تعطي مخرجاً صحيحاً (1) فقط عندما تكون جميع مدخلاتها صحيحة (1)؟", code: "", options:[{t:"بوابة OR",id:"A"},{t:"بوابة XOR",id:"B"},{t:"بوابة NOT",id:"C"},{t:"بوابة AND",id:"D"}], ans: "D", hint: "بوابة AND تشترط تحقق جميع الشروط (المدخلات) لتمرير الإشارة." },
            { skill: "التفكير الحسابي (Binary Arithmetic)", text: "في عملية الطرح الثنائي (Binary Subtraction)، ما هو ناتج 10 - 01 (بالنظام الثنائي)؟", code: "", options:[{t:"01",id:"A"},{t:"11",id:"B"},{t:"10",id:"C"},{t:"00",id:"D"}], ans: "A", hint: "في الثنائي، 10 (تكافئ 2 عشري) ناقص 01 (تكافئ 1 عشري) تساوي 01." },
            { skill: "نظم المعلومات (DBMS)", text: "تم تصميم قاعدة بيانات مدرسية. أي نوع من قواعد البيانات ينظم البيانات في جداول متعددة مترابطة رياضياً بعلاقات محددة؟", code: "", options:[{t:"الشبكية (Network Database)",id:"A"},{t:"العلائقية (Relational Database)",id:"B"},{t:"الهرمية (Hierarchical Database)",id:"C"},{t:"المسطحة (Flat File Database)",id:"D"}], ans: "B", hint: "قواعد البيانات العلائقية تعتمد على جداول ترتبط ببعضها عبر مفاتيح." },
            { skill: "تطبيق الويب (HTML Structure)", text: "في لغة HTML، ما هو الوسم والطريقة الصحيحة لإدراج صورة مع تحديد نص بديل ليقرأه قارئ الشاشة؟", code: "", options:[{t:"<img href=\"pic.jpg\" text=\"صورة\">",id:"A"},{t:"<image src=\"pic.jpg\" alt=\"صورة\"></image>",id:"B"},{t:"<img src=\"pic.jpg\" alt=\"صورة\">",id:"C"},{t:"<pic url=\"pic.jpg\" desc=\"صورة\">",id:"D"}], ans: "C", hint: "يُستخدم الوسم المستقل <img> مع الخاصيتين src للمسار و alt للنص البديل." },
            { skill: "التصميم والتنسيق (CSS Selectors)", text: "كيف يمكنك استهداف جميع العناصر التي تحمل فئة (Class) باسم \"active\" في ملف CSS لتغيير لون النص إلى الأحمر؟", code: "", options:[{t:"#active { color: red; }",id:"A"},{t:"active { color: red; }",id:"B"},{t:".active { text-color: red; }",id:"C"},{t:".active { color: red; }",id:"D"}], ans: "D", hint: "في CSS، يُشار للفئة بالنقطة (.) ولون النص يُغير بالخاصية color." },
            { skill: "الاستنتاج (CSS Cascading)", text: "وفقاً لقواعد التتالي (Cascading) في CSS، إذا تعارضت قاعدتان بنفس قوة التحديد، أيهما سيتم تطبيقه؟", code: "", options:[{t:"القاعدة التي كُتبت أولاً (في الأعلى)",id:"A"},{t:"القاعدة التي كُتبت آخراً (في الأسفل)",id:"B"},{t:"يتم دمج الألوان عشوائياً",id:"C"},{t:"تُتجاهل كلتا القاعدتين",id:"D"}], ans: "B", hint: "القاعدة الأخيرة في تسلسل الكود تلغي وتستبدل ما سبقها." },
            { skill: "Debugging (Logical Operators Trap)", text: "ما هو الفخ المنطقي (Logical Trap) في كتابة نطاق المقارنة المزدوجة في JavaScript كما يلي؟", code: "if (10 < x < 20) { console.log(\"True\"); }", options:[{t:"البرنامج سينتج خطأ مباشر",id:"A"},{t:"سيعمل الكود بشكل سليم ويقارن النطاق",id:"B"},{t:"سيُقيم (10 < x) أولاً كـ (true/false) ويقارنها مع 20 مما يعطي دائماً true",id:"C"},{t:"سيتجاهل المتصفح الرقم 20 تماماً",id:"D"}], ans: "C", hint: "الجافاسكريبت تقيم من اليسار لليمين. (true/false) تتحول إلى (1/0)، وكلاهما أصغر من 20." },
            { skill: "فهم الشبكات (Internet Infrastructure)", text: "يُستخدم نظام (DNS) في شبكات الكمبيوتر للقيام بوظيفة حيوية. ما هي؟", code: "", options:[{t:"مراقبة الفيروسات في الشبكة",id:"A"},{t:"تقسيم البيانات إلى حزم صغيرة",id:"B"},{t:"ترجمة أسماء النطاقات المقروءة إلى عناوين IP رقمية",id:"C"},{t:"تخصيص المساحات التخزينية",id:"D"}], ans: "C", hint: "الـ DNS هو بمثابة \"دليل الهاتف\" للإنترنت الذي يربط الأسماء بالأرقام." },
            { skill: "الأساسيات (Algorithmic Thinking)", text: "ما هي الخوارزمية (Algorithm) في سياق البرمجة وعلوم الحاسب؟", code: "", options:[{t:"لغة برمجة متقدمة",id:"A"},{t:"قطعة مادية داخل المعالج",id:"B"},{t:"سلسلة خطوات منطقية ومرتبة وإجراءات واضحة لحل مشكلة محددة",id:"C"},{t:"برنامج فيروسي يعطل البيانات",id:"D"}], ans: "C", hint: "الخوارزمية هي المنهجية أو الخطة الدقيقة المكتوبة لحل مشكلة قبل تحويلها لكود." },
            { skill: "التفكير الحسابي (Flowchart Symbols)", text: "أي شكل هندسي يُستخدم في المخططات الانسيابية لتمثيل نقطة اتخاذ القرار (التفرع / الشروط)؟", code: "", options:[{t:"المستطيل",id:"A"},{t:"الشكل البيضاوي",id:"B"},{t:"متوازي الأضلاع",id:"C"},{t:"المعين (Diamond)",id:"D"}], ans: "D", hint: "المعين يُستخدم لاختبار الشروط (Yes/No) لتوجيه مسار التدفق." },
            { skill: "تتبع الكود (Loop Arrays)", text: "عند تصميم حلقة تكرارية للبحث داخل مصفوفة تحتوي على 5 عناصر. ما هو شرط التوقف المثالي باستخدام خاصية length؟", code: "for(let i = 0; i <= arr.length; i++)", options:[{t:"يجب استخدام < بدلاً من <= لأن الفهارس تبدأ من 0 وتنتهي عند length-1",id:"A"},{t:"يجب استخدام i-- للبحث",id:"B"},{t:"يجب البدء من i=1",id:"C"},{t:"خاصية length لا تستخدم مع المصفوفات",id:"D"}], ans: "A", hint: "استخدام <= يجعل الحلقة تبحث في الفهرس رقم 5 وهو غير موجود (undefined)." },
            { skill: "الاستنتاج (For...of Loops)", text: "ماذا سيطبع هذا الكود الذي يهدف لطباعة عناصر المصفوفة باستخدام حلقة for...of؟", code: "let data =[];\nfor(let x of data) {\n  console.log(\"Hi\");\n}", options:[{t:"يطبع Hi مرة واحدة",id:"A"},{t:"يطبع undefined",id:"B"},{t:"ينتج خطأ",id:"C"},{t:"لا يطبع شيئاً على الإطلاق",id:"D"}], ans: "D", hint: "بما أن المصفوفة فارغة (طولها 0)، جسم الحلقة لن يُنفذ ولا مرة واحدة." },
            { skill: "التفكير الحسابي (Tracing Loops)", text: "في الكود التالي، ما هي القيمة النهائية للمتغير total؟", code: "let total = 1;\nfor(let i = 1; i <= 3; i++) {\n  total *= i;\n}", options:[{t:"6",id:"A"},{t:"3",id:"B"},{t:"0",id:"C"},{t:"9",id:"D"}], ans: "A", hint: "في الدورات: 1*1=1، 1*2=2، 2*3=6. النتيجة 6 (مضروب 3)." },
            { skill: "التحليل (Data Design)", text: "تطبيق يقوم بتحليل بيانات الاستبيانات وتحويلها إلى جداول ورسوم بيانية مرئية. هذه العملية في تصميم البيانات تُسمى:", code: "", options:[{t:"التجريد (Abstraction)",id:"A"},{t:"التصور (Visualization)",id:"B"},{t:"الهيكلة (Structuring)",id:"C"},{t:"التشفير (Encryption)",id:"D"}], ans: "B", hint: "التصور هو تمثيل البيانات بصرياً لتسهيل قراءتها واستيعابها." },
            { skill: "المفاهيم التكنولوجية (IoT)", text: "أي من التقنيات التالية تتيح ربط الأشياء المادية اليومية بالإنترنت ليتم التحكم بها عن بعد؟", code: "", options:[{t:"الواقع المعزز (AR)",id:"A"},{t:"الواقع الافتراضي (VR)",id:"B"},{t:"إنترنت الأشياء (IoT)",id:"C"},{t:"تشفير البيانات (Encryption)",id:"D"}], ans: "C", hint: "إنترنت الأشياء هو شبكة الأجهزة المتصلة التي تتواصل وتتبادل البيانات." },
            { skill: "المنطق المتقدم (Boolean Coercion)", text: "ما هو ناتج تقييم التعبير التالي في لغة JavaScript الذي يجمع بين المقارنة ونفي النفي؟", code: "let value = \"\";\nconsole.log(!!value === false);", options:[{t:"ينتج خطأ SyntaxError",id:"A"},{t:"يطبع true",id:"B"},{t:"يطبع false",id:"C"},{t:"يطبع NaN",id:"D"}], ans: "B", hint: "السلسلة الفارغة تعتبر Falsy. النفي المزدوج (!!) يحولها لـ false. (false === false) نتيجتها true." },
            { skill: "الوعي الأمني (Cyber Threats)", text: "ما الفرق في أمن المعلومات بين فيروس حصان طروادة والدودة؟", code: "", options:[{t:"حصان طروادة يتكاثر ذاتياً، بينما الدودة تتخفى",id:"A"},{t:"حصان طروادة يتخفى في برامج شرعية، بينما الدودة تستنسخ نفسها تلقائياً وتنتشر",id:"B"},{t:"كلاهما يطلبان فدية",id:"C"},{t:"طروادة يهاجم الأجهزة، والدودة للشبكات فقط",id:"D"}], ans: "B", hint: "الدودة تنتشر آلياً بدون تدخل بشري." },
            { skill: "AI Ethics (Machine Learning)", text: "أثناء جمع وتحليل البيانات لتدريب نموذج (تعلم آلي)، من الضروري:", code: "", options:[{t:"إدخال بيانات متحيزة لتسريع التعلم",id:"A"},{t:"استخدام بيانات قليلة جداً",id:"B"},{t:"إدخال بيانات متنوعة ودقيقة وخالية من التحيز لضمان قرارات عادلة",id:"C"},{t:"تجاهل البيانات القديمة",id:"D"}], ans: "C", hint: "جودة وعدالة الذكاء الاصطناعي تعتمد كلياً على جودة وموضوعية البيانات." },
            { skill: "نظم المعلومات (Databases)", text: "في قواعد البيانات، ما هي لغة الاستعلام الهيكلية (SQL) المخصصة لقواعد البيانات العلائقية؟", code: "", options:[{t:"لغة تصميم واجهات",id:"A"},{t:"لغة تطبيقات هواتف",id:"B"},{t:"لغة قياسية تُستخدم للبحث والتحديث واستخراج البيانات من الجداول المترابطة",id:"C"},{t:"نظام تشغيل مخصص",id:"D"}], ans: "C", hint: "لغة SQL هي لغة التخاطب الأساسية مع أنظمة قواعد البيانات العلائقية." },
            { skill: "تحليل الكود (Function Mechanics)", text: "ما هي وظيفة الأمر return داخل الدالة البرمجية؟", code: "", options:[{t:"إيقاف البرنامج بالكامل وإظهار رسالة خطأ",id:"A"},{t:"إعادة تكرار الحلقة",id:"B"},{t:"إنهاء تنفيذ الدالة فوراً وإرجاع النتيجة أو القيمة لمن استدعى الدالة",id:"C"},{t:"طباعة القيمة للمستخدم",id:"D"}], ans: "C", hint: "الأمر return هو طريقة الدالة لتسليم المخرجات النهائية لمن استدعاها." },
            { skill: "التفكير الحسابي (Spreadsheet)", text: "في ورقة عمل الجداول الحسابية، تم كتابة الصيغة التالية لمحاكاة رمي حجر نرد ذو 6 أوجه. أي صيغة هي الصحيحة؟", code: "", options:[{t:"=INT(RAND() * 6) + 1",id:"A"},{t:"=RAND() * 6",id:"B"},{t:"=RANDBETWEEN(0, 5)",id:"C"},{t:"=ROUND(RAND() * 6)",id:"D"}], ans: "A", hint: "توليد كسر ثم الضرب في 6 وإزالة الكسر والجمع مع 1 يعطي (1 إلى 6)." },
            { skill: "Debugging (Array Coercion)", text: "قام مبرمج بكتابة الكود التالي لجمع مصفوفتين. ما هو الناتج الفعلي للطباعة؟", code: "let a = [4, 5];\nlet b = [6, 7];\nconsole.log(a + b);", options: [{t:"[4-7]",id:"A"},{t:"NaN",id:"B"},{t:"4,56,7",id:"C"},{t:"10",id:"D"}], ans: "C", hint: "المتصفح يحول المصفوفتين لنصوص ويدمجهما كـ string." },
            { skill: "المواطنة الرقمية (Copyrights)", text: "أي من المبادئ التالية يُعتبر أساساً في قوانين الملكية الفكرية عند استخدام مواد من الإنترنت؟", code: "", options:[{t:"كل ما يوجد على الإنترنت هو ملكية عامة",id:"A"},{t:"الاستخدام العادل يسمح ببيع العمل دون إذن",id:"B"},{t:"يجب احترام رخص المشاع الإبداعي والالتزام بشروطها",id:"C"},{t:"الملكية الفكرية تحمي الأجهزة المادية فقط",id:"D"}], ans: "C", hint: "رخص المشاع الإبداعي تنظم كيفية إعادة استخدام الأعمال الرقمية قانونياً." },
            { skill: "الأساسيات (Character Encoding)", text: "يُعد نظام التشفير (Unicode) أفضل من نظام (ASCII) في بيئات الويب. ما السبب التقني؟", code: "", options:[{t:"لأنه يستهلك مساحة تخزين أقل",id:"A"},{t:"لأنه مخصص للغة الإنجليزية فقط",id:"B"},{t:"لأنه معيار دولي يستوعب أحرف ورموز جميع لغات العالم لتجنب فساد البيانات",id:"C"},{t:"لأنه نظام تشفير فيروسات",id:"D"}], ans: "C", hint: "الـ Unicode يحل مشكلة تشوه النصوص عند تداخل اللغات المختلفة." },

            { skill: "الأساسيات (Code Comments)", text: "طالب قام بكتابة تعليق (Comment) يمتد لعدة أسطر في JavaScript. ما هي الصيغة الصحيحة؟", code: "", options:[{t:"<!-- Comment -->",id:"A"},{t:"// Comment //",id:"B"},{t:"/* Comment */",id:"C"},{t:"** Comment **",id:"D"}], ans: "C", hint: "الرمز /* للبداية و */ للنهاية." },

        ];

        // حالة التطبيق 
        const state = {
            currentQuestionIndex: 0, score: 0,
            studentData: { name: '' },
            isProcessing: false, mistakes:[],
            timeRemaining: 50 * 60, 
            timerInterval: null
        };

        const container = document.getElementById('app-container');
        const progressWrapper = document.getElementById('progressWrapper');
        const progressBar = document.getElementById('progressBar');

        let audioCtx = null;
        function initAudio() {
            if (!audioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; if(AudioContext) audioCtx = new AudioContext(); }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }
        
        function playTone(type) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator(), gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'correct') { 
                    osc.type = 'sine'; 
                    osc.frequency.setValueAtTime(600, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1); 
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); 
                } else { 
                    osc.type = 'sawtooth'; 
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime); 
                    osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.2); 
                    gain.gain.setValueAtTime(0.1, audioCtx.currentTime); 
                    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); 
                }
                osc.start(); 
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        function changeHue() { document.documentElement.style.setProperty('--hue', Math.floor(Math.random() * 360)); }
        function createCard(html) { const card = document.createElement('div'); card.className = 'card'; card.innerHTML = html; return card; }
        
        function transitionTo(newCard) {
            const oldCard = document.querySelector('.card.active');
            if (oldCard) {
                oldCard.classList.remove('active');
                setTimeout(() => oldCard.remove(), 400);
            }
            container.appendChild(newCard);
            setTimeout(() => newCard.classList.add('active'), 10);
            changeHue();
        }

        function startTimer() {
            clearInterval(state.timerInterval);
            state.timerInterval = setInterval(() => {
                if(state.timeRemaining <= 0) {
                    clearInterval(state.timerInterval);
                    showResults();
                    return;
                }
                state.timeRemaining--;
                const m = Math.floor(state.timeRemaining / 60).toString().padStart(2, '0');
                const s = (state.timeRemaining % 60).toString().padStart(2, '0');
                const timerEl = document.getElementById('quizTimerText');
                const timerBadge = document.getElementById('quizTimerBadge');
                if (timerEl) timerEl.innerText = `${m}:${s}`;
                if (state.timeRemaining < 300 && timerBadge) timerBadge.classList.add('timer-danger');
            }, 1000);
        }

        function showDesignerAndIntro() {
            const html = `
                <div style="flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; width: 100%;">
                    <div class="rect-img-container">
                        <img src="https://share.google/DNdZnIVkmNOhKSInM" alt="المهندس محمد محمود شاهين">
                    </div>
                    <div style="margin-top: 15px; width: 100%;">
                        <span style="color:#cbd5e1; font-size:1rem; font-weight:700; display:block; margin-bottom:5px;">إعداد وتصميم</span>
                        <div class="brand-name">المهندس محمد محمود شاهين</div>
                    </div>
                    <p style="font-size: 1rem; color: var(--text-muted); margin: 12px 0; line-height: 1.6; font-weight:700; text-align: center;">خبير النظم التعليمية الذكية وتقنيات الذكاء الاصطناعي</p>
                    <div style="width: 100%; max-width: 400px; margin-top: 15px;">
                        <div class="input-group">
                            <label>اسمك الثلاثي (مطلوب) 👤</label>
                            <input type="text" id="studentName" placeholder="أدخل اسمك لتبدأ..." autocomplete="off">
                        </div>
                    </div>
                </div>
                <button class="btn-primary" id="btnNext" disabled style="margin-top: 15px;">التالي <i class="fas fa-arrow-left"></i></button>
            `;
            const card = createCard(html); 
            transitionTo(card);
            const inputName = card.querySelector('#studentName'), btn = card.querySelector('#btnNext');
            inputName.addEventListener('input', () => { btn.disabled = inputName.value.trim().length < 3; });
            btn.addEventListener('click', () => {
                state.studentData.name = inputName.value.trim();
                showDedication();
            });
        }

        function showDedication() {
            initAudio();
            if (typeof confetti === 'function') confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            const html = `
                <div class="dedication-content">
                    <h1 class="dedication-title glow-text">✨ إهداء خاص ✨</h1>
                    <div class="dedication-section ded-delay-1 float-animation">
                        <div class="ded-label">🎩 إلى السيد موجه عام الكمبيوتر التعليمي بكفر الشيخ</div>
                        <div class="name-highlight pulse-gold">الأستاذ / مصطفى كساب</div>
                    </div>
                    <div class="dedication-section ded-delay-2">
                        <div class="ded-label">📚 وكذلك الإهداء إلى توجيه الكمبيوتر التعليمي بإدارة قلين التعليمية</div>
                        <div class="name-highlight shine">الأستاذ / السعيد شكر</div>
                        <div class="name-highlight shine">الأستاذ / صبحي هاشم</div>
                    </div>
                    <div class="dedication-timer-box"><i class="fas fa-hourglass-half"></i> سيبدأ الاختبار تلقائياً خلال <span id="dedTimer">15</span> ثانية</div>
                </div>
            `;
            const card = createCard(html); 
            transitionTo(card);
            let timeLeft = 15;
            const timerEl = card.querySelector('#dedTimer');
            const interval = setInterval(() => {
                timeLeft--;
                if(timerEl) timerEl.innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(interval); startQuizReal(); }
            }, 1000);
        }

        function startQuizReal() {
            progressWrapper.style.display = 'block';
            startTimer();
            showQuestion(0);
        }

        function restartQuiz() {
            state.currentQuestionIndex = 0; state.score = 0; state.mistakes = []; state.timeRemaining = 50 * 60;
            if(state.timerInterval) clearInterval(state.timerInterval);
            progressWrapper.style.display = 'block';
            startTimer();
            showQuestion(0);
        }

        function showQuestion(index) {
            if (index >= quizData.length) { showResults(); return; }
            state.currentQuestionIndex = index; 
            const q = quizData[index];
            progressBar.style.width = `${((index) / quizData.length) * 100}%`;
            const shuffledOptions = [...q.options].sort(() => Math.random() - 0.5), letters = ['A', 'B', 'C', 'D'];
            const m = Math.floor(state.timeRemaining / 60).toString().padStart(2, '0');
            const s = (state.timeRemaining % 60).toString().padStart(2, '0');
            const dangerClass = state.timeRemaining < 300 ? 'timer-danger' : '';
            
            let html = `
                <div class="question-meta">
                    <span class="timer-badge ${dangerClass}" id="quizTimerBadge"><i class="fas fa-clock"></i> <span id="quizTimerText">${m}:${s}</span></span>
                    <span>السؤال ${index + 1} / ${quizData.length}</span>
                    <span style="color: hsla(var(--hue), 90%, 70%, 1);"><i class="fas fa-brain"></i> ${q.skill}</span>
                </div>
                <div class="question-text">${q.text}</div>
                ${q.code ? `<div class="code-block">${q.code.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div>` : ''}
                <div class="options-grid">
                    ${shuffledOptions.map((opt, i) => `<div class="option-btn" data-id="${opt.id}"><div class="option-letter">${letters[i]}</div><div style="flex-grow: 1; text-align: center;">${opt.t.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</div></div>`).join('')}
                </div>
            `;
            const card = createCard(html); 
            transitionTo(card); 
            state.isProcessing = false;
            
            const buttons = card.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', function() {
                    if (state.isProcessing) return; 
                    state.isProcessing = true;
                    const selectedId = this.getAttribute('data-id'), isCorrect = (selectedId === q.ans);
                    buttons.forEach(b => b.classList.add('disabled'));
                    if (isCorrect) {
                        this.classList.add('correct'); 
                        playTone('correct'); 
                        state.score++;
                    } else {
                        this.classList.add('wrong'); 
                        playTone('wrong');
                        state.mistakes.push({ q: q.text, code: q.code, w: q.options.find(o => o.id === selectedId).t, c: q.options.find(o => o.id === q.ans).t, h: q.hint });
                        buttons.forEach(b => { if (b.getAttribute('data-id') === q.ans) b.classList.add('correct'); });
                    }
                    setTimeout(() => showQuestion(index + 1), 1800);
                });
            });
        }

        function showResults() {
            clearInterval(state.timerInterval);
            progressWrapper.style.display = 'none';
            const total = quizData.length, percentage = Math.round((state.score / total) * 100);
            let message = '', emoji = '';
            if (percentage < 50) { message = 'شكلك مفتحتش الكتاب حاول مرة أخرى'; emoji = '❌😄'; }
            else if (percentage <= 64) { message = 'شد حيلك مقبول'; emoji = '🙂'; }
            else if (percentage <= 74) { message = 'حلو يابني جيد'; emoji = '👍'; }
            else if (percentage <= 84) { message = 'جيد جدًا يا هندس'; emoji = '🔥'; }
            else { message = 'ممتاز يا هندسة'; emoji = '🏆👑'; }
            
            if (percentage >= 50) try { confetti({ particleCount: 150, spread: 80, origin: { y: 0.5 } }); } catch(e){}
            
            const html = `
                <div style="flex-grow:1; display:flex; flex-direction:column; align-items:center; justify-content:center; width:100%;">
                    <h2 class="title">التقرير النهائي 📊</h2>
                    <p style="font-size:1.4rem; margin-top: 8px; font-weight:800; text-align:center;">البطل: <strong style="color: hsla(var(--hue), 80%, 65%, 1);">${state.studentData.name}</strong></p>
                    <div class="score-circle" style="--percentage: ${percentage}"><div class="score-value">${percentage}%</div></div>
                    <h3 style="font-size: 1.6rem; margin: 10px 0; text-align:center;">${message} ${emoji}</h3>
                    <p style="color: var(--text-muted); font-size: 1.2rem; margin-bottom: 20px; text-align:center;">الإجابات الصحيحة: ${state.score} من ${total}</p>
                    <div style="display:flex; flex-direction:column; gap:12px; width:100%; max-width: 400px; margin:0 auto;">
                        ${state.mistakes.length > 0 ? `<button class="btn-primary btn-review" id="btnMistakes">مراجعة الأخطاء 📖</button>` : ''}
                        <button class="btn-primary btn-restart" id="btnRestart">إعادة الاختبار 🔄</button>
                        <button class="btn-primary btn-whatsapp" id="btnWhatsapp">إرسال للمهندس 📲 <i class="fab fa-whatsapp"></i></button>
                        <button class="btn-primary" id="btnFinish" style="background: rgba(255,255,255,0.05);">الخاتمة 🏁</button>
                    </div>
                </div>
            `;
            const card = createCard(html); 
            transitionTo(card);
            if (state.mistakes.length > 0) card.querySelector('#btnMistakes').addEventListener('click', showMistakes);
            card.querySelector('#btnRestart').addEventListener('click', restartQuiz);
            card.querySelector('#btnWhatsapp').addEventListener('click', () => {
                const msg = `مرحباً 🌹\nالطالب: *${state.studentData.name}*\nالنتيجة: *${state.score}/${total}*\nالنسبة: *${percentage}%*\nالتقييم: *${message}*`;
                window.open(`https://wa.me/201029966799?text=${encodeURIComponent(msg)}`, '_blank');
            });
            card.querySelector('#btnFinish').addEventListener('click', showOutro);
        }

        function showMistakes() {
            const html = `<h2 class="title" style="font-size: 1.8rem;">مراجعة الأخطاء 📖</h2>
                <div style="display:flex; flex-direction:column; gap: 12px; overflow-y:auto; flex-grow:1; width:100%;">
                    ${state.mistakes.map((m, i) => `<div class="mistake-item"><h4 style="text-align:center;">${i+1}. ${m.q}</h4>${m.code ? `<div class="code-block">${m.code.replace(/</g,"&lt;")}</div>` : ''}<div class="mistake-ans m-wrong"><i class="fas fa-times-circle"></i> إجابتك: ${m.w}</div><div class="mistake-ans m-correct"><i class="fas fa-check-circle"></i> الصحيحة: ${m.c}</div><div class="m-hint"><i class="fas fa-lightbulb"></i> <strong>تلميح:</strong> ${m.h}</div></div>`).join('')}
                </div>
                <div style="display:flex; flex-direction:column; gap: 12px; margin-top: 15px; width:100%; max-width:400px; margin-left:auto; margin-right:auto;">
                    <button class="btn-primary btn-restart" id="btnRestartReview">إعادة الاختبار 🔄</button>
                    <button class="btn-primary" id="btnFinishReview">الخاتمة 🏁</button>
                </div>`;
            const card = createCard(html); 
            transitionTo(card);
            card.querySelector('#btnRestartReview').addEventListener('click', restartQuiz);
            card.querySelector('#btnFinishReview').addEventListener('click', showOutro);
        }

        function showOutro() {
            const html = `<div style="flex-grow:1; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; width:100%;">
                    <div class="rect-img-container" style="width:140px; height:190px;"><img src="https://cdn.jsdelivr.net/gh/mhshahen6/mh_photo@main/1770841296798.webp" alt="مهندس"></div>
                    <h2 class="title" style="margin-top:15px;">Thanks & Regards ❤️</h2>
